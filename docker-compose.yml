services:
  haven-headless:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${HOST_PORT:-5001}:5000"
    environment:
      APP_DATA_DIR: /data
    volumes:
      - haven_headless_data:/data
    restart: unless-stopped
    # Backstop: with no limit here, each headless-client JVM's default heap
    # ergonomics scale off full host RAM instead of a container budget, so
    # several parallel scout jobs (scheduler.MAX_PARALLEL) can OOM the host.
    mem_limit: 4g

volumes:
  haven_headless_data:
