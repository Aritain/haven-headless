<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Gob Checker</title>
    <style>
        :root { --bg: #14161a; --panel: #1e2126; --border: #2c2f36; --text: #e6e6e6;
                --muted: #9aa0a6; --accent: #4f8cff; --found: #3ecf6a; --err: #ff5c5c; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif;
               margin: 0; padding: 0; }
        nav { background: var(--panel); border-bottom: 1px solid var(--border);
              padding: 14px 24px; display: flex; gap: 20px; align-items: center; }
        nav a { color: var(--text); text-decoration: none; font-size: 14px; opacity: 0.85; }
        nav a:hover { opacity: 1; color: var(--accent); }
        nav .brand { font-weight: 600; margin-right: 20px; }
        main { padding: 24px; max-width: 1400px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        .table-wrap { overflow-x: auto; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        .group-row td { background: var(--bg); color: var(--muted); font-size: 11px; text-transform: uppercase;
                         padding: 6px 12px; border-bottom: 1px solid var(--border); letter-spacing: 0.03em; }
        th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
                 padding: 20px; margin-bottom: 20px; }
        .btn { background: var(--accent); color: white; border: none; padding: 7px 14px;
               border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn.danger { background: var(--err); }
        .btn.small { padding: 4px 10px; font-size: 12px; }
        input, select, textarea { background: #0f1114; border: 1px solid var(--border); color: var(--text);
                         padding: 8px 10px; border-radius: 6px; font-size: 14px; width: 100%; font-family: inherit; }
        label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; margin-top: 12px; }
        .row { display: flex; gap: 12px; }
        .row > * { flex: 1; }
        .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .badge.found { background: rgba(62,207,106,0.15); color: var(--found); }
        .badge.notfound { background: rgba(154,160,166,0.15); color: var(--muted); }
        .badge.error { background: rgba(255,92,92,0.15); color: var(--err); }
        .badge.on { background: rgba(62,207,106,0.15); color: var(--found); }
        .badge.off { background: rgba(154,160,166,0.15); color: var(--muted); }
        form.inline { display: inline; }
        .row-actions { display: flex; align-items: center; gap: 8px; }
        .toggle { width: 36px; height: 20px; border-radius: 10px; border: 1px solid var(--border);
                  background: var(--panel); position: relative; cursor: pointer; padding: 0; flex-shrink: 0; }
        .toggle.on { background: var(--found); border-color: var(--found); }
        .toggle-knob { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px;
                        border-radius: 50%; background: #fff; transition: left 0.15s; }
        .toggle.on .toggle-knob { left: 18px; }
        .icon-btn { width: 28px; height: 28px; border-radius: 50%; display: inline-flex;
                    align-items: center; justify-content: center; border: 1px solid var(--border);
                    background: transparent; cursor: pointer; padding: 0; flex-shrink: 0; }
        .icon-btn:hover { background: var(--border); }
        .icon-btn.play { color: var(--found); border-color: var(--found); }
        .log-row .when, .log-row .action { color: var(--muted); font-size: 12px; white-space: nowrap; }
        .icon-btn.trash { color: var(--err); border-color: var(--err); }
        .log-error td:first-child { border-left: 3px solid var(--err); }
        .log-error td { color: var(--err) !important; }
        .log-success td:first-child { border-left: 3px solid var(--found); }
        h1 { font-size: 20px; margin: 0 0 4px 0; }
        .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
    </style>
</head>
<body>
<nav>
    <span class="brand">Gob Checker</span>
    <a href="{{ url_for('index') }}">Jobs</a>
    <a href="{{ url_for('accounts') }}">Accounts &amp; Characters</a>
    <a href="{{ url_for('settings') }}">Settings</a>
    <a href="{{ url_for('logs') }}">Logs</a>
    {% if current_user.is_authenticated and current_user.is_admin %}
    <a href="{{ url_for('admin_users') }}">Users</a>
    {% endif %}
    <span style="flex:1;"></span>
    {% if current_user.is_authenticated %}
    <span style="color:var(--muted); font-size:13px;">{{ current_user.email }}</span>
    <form method="post" action="{{ url_for('logout') }}" class="inline">
        <button class="btn small secondary" type="submit">Log out</button>
    </form>
    {% endif %}
</nav>
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
