<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Sign up — Gob Checker</title>
    <style>
        body { background: #14161a; color: #e6e6e6; font-family: system-ui, sans-serif;
               display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: #1e2126; border: 1px solid #2c2f36; border-radius: 8px; padding: 28px; width: 320px; }
        h1 { font-size: 18px; margin: 0 0 4px 0; }
        .subtitle { font-size: 12px; color: #9aa0a6; margin-bottom: 16px; }
        label { display: block; font-size: 12px; color: #9aa0a6; margin-bottom: 4px; margin-top: 12px; }
        input { background: #0f1114; border: 1px solid #2c2f36; color: #e6e6e6;
                padding: 8px 10px; border-radius: 6px; font-size: 14px; width: 100%; box-sizing: border-box; }
        .btn { background: #4f8cff; color: white; border: none; padding: 9px 14px;
               border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; margin-top: 18px; }
        .msg { padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 12px; }
        .msg.error { background: rgba(255,92,92,0.15); color: #ff5c5c; }
        .msg.success { background: rgba(62,207,106,0.15); color: #3ecf6a; }
        .foot { margin-top: 16px; font-size: 12px; color: #9aa0a6; text-align: center; }
        .foot a { color: #4f8cff; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Create account</h1>
        <div class="subtitle">An admin needs to approve you before you can log in.</div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div class="msg {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        <form method="post">
            <label>Username</label>
            <input type="text" name="email" required autofocus>
            <label>Password</label>
            <input type="password" name="password" required minlength="8">
            <label>Confirm password</label>
            <input type="password" name="confirm" required minlength="8">
            <button class="btn" type="submit">Sign up</button>
        </form>
        <div class="foot">Already have an account? <a href="{{ url_for('login') }}">Log in</a></div>
    </div>
</body>
</html>
